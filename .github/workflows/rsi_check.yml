name: RSI Monitor

on:
  schedule:
    # 北京时间 09:30-15:00 每30分钟检查一次
    - cron: '*/30 1-7 * * 1-5'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 5

      - name: Run RSI check
        run: |
          python github_action_runner.py
        timeout-minutes: 10

      - name: Check generated files
        run: |
          echo "Checking if data files were generated..."
          ls -la docs/
          cat docs/data.json || echo "data.json not found"
        if: always()

      - name: Commit and push
        uses: EndBug/add-and-commit@v10
        with:
          add: 'docs/'
          message: 'Update RSI data - {{ date }}'
          default_author: github_actor
        if: success()
