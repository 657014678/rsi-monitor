<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价值投资控制台 · RSI21+MA250 / PE+回撤</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --text-bright: #f0f6fc;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 12px;
  max-width: 480px;
  margin: 0 auto;
}
.header { text-align:center; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.header h1 { font-size:18px; color:var(--text-bright); margin-bottom:4px; }
.subtitle { font-size:12px; color:var(--text-dim); }
.live-clock { font-size:20px; font-weight:700; color:var(--text-bright); font-variant-numeric:tabular-nums; letter-spacing:1px; margin-top:6px; }
.live-clock .sep { animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.header-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:6px; }
.guide-btn { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:4px 10px; border-radius:6px; background:rgba(63,185,80,0.12); color:var(--green); text-decoration:none; border:1px solid rgba(63,185,80,0.25); }
.weight-bar { display:flex; gap:6px; margin-bottom:16px; justify-content:center; }
.weight-tag { font-size:11px; padding:3px 10px; border-radius:12px; background:var(--card); border:1px solid var(--border); color:var(--text-dim); }
.weight-tag .w { color:var(--text-bright); font-weight:600; }
.etf-section { margin-bottom:20px; }
.etf-title { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding:8px 12px; background:var(--card); border-radius:8px; border-left:3px solid var(--accent); }
.etf-title.pe { border-left-color:var(--purple); }
.etf-title .name { font-size:16px; font-weight:600; color:var(--text-bright); }
.etf-title .fund-code { font-size:12px; color:var(--text-dim); margin-left:auto; }
.etf-title .wb { font-size:10px; padding:1px 6px; border-radius:8px; background:rgba(88,166,255,0.15); color:var(--accent); font-weight:600; }
.etf-title.pe .wb { background:rgba(188,140,255,0.15); color:var(--purple); }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; }
.card-label { font-size:11px; color:var(--text-dim); margin-bottom:6px; }
.price-row { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
.price-main { font-size:28px; font-weight:700; color:var(--text-bright); }
.price-change { font-size:14px; font-weight:600; }
.price-up { color:var(--red); }
.price-down { color:var(--green); }
.price-flat { color:var(--text-dim); }
.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.metric-box { background:rgba(255,255,255,0.03); border-radius:6px; padding:8px 10px; }
.metric-label { font-size:10px; color:var(--text-dim); }
.metric-value { font-size:16px; font-weight:600; color:var(--text-bright); }
.signal-bar { display:flex; align-items:center; gap:10px; margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.05); }
.signal-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.signal-dot.green { background:var(--green); box-shadow:0 0 8px var(--green); }
.signal-dot.yellow { background:var(--yellow); box-shadow:0 0 8px var(--yellow); }
.signal-dot.red { background:var(--red); box-shadow:0 0 8px var(--red); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.signal-label { font-size:14px; font-weight:600; color:var(--text-bright); }
.signal-detail { font-size:12px; color:var(--text-dim); margin-left:auto; }
.advice-item { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.advice-icon { font-size:14px; flex-shrink:0; margin-top:2px; }
.advice-line { font-size:13px; color:var(--text); }
.advice-line strong { color:var(--text-bright); font-size:14px; }
.advice-line .advice-rule { color:var(--accent); font-size:11px; }
.divider { height:1px; background:var(--border); margin:20px 0; }
.loading { text-align:center; padding:40px 0; color:var(--text-dim); }
.error-msg { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); border-radius:6px; padding:12px; text-align:center; color:var(--red); font-size:13px; }
.update-time { font-size:11px; color:var(--text-dim); margin-top:6px; }
.val-bar { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; }
.val-card { flex:1; min-width:0; padding:8px 10px; border-radius:8px; background:var(--card); border:1px solid var(--border); text-align:center; }
.val-card .vc-name { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.val-card .vc-zone { font-size:12px; font-weight:700; margin-top:3px; }
.val-card .vc-sub { font-size:10px; color:var(--text-dim); margin-top:2px; }
.vc-green { color:var(--green); }
.vc-yellow { color:var(--yellow); }
.vc-red { color:var(--red); }
.vc-purple { color:var(--purple); }
.val-gauge { height:5px; border-radius:3px; background:rgba(255,255,255,0.08); margin-top:5px; overflow:hidden; }
.val-gauge-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.weight-label { text-align:center; font-size:11px; color:var(--text-dim); margin-bottom:6px; }
.hist-title { font-size:11px; color:var(--text-dim); margin-top:10px; margin-bottom:6px; padding-top:8px; border-top:1px solid var(--border); }
.hist-row { display:flex; align-items:center; gap:6px; padding:4px 0; font-size:11px; border-bottom:1px solid rgba(255,255,255,0.03); flex-wrap:wrap; }
.hist-date { color:var(--text-dim); min-width:72px; }
.hist-rule { color:var(--text); flex:1; min-width:0; }
.hist-invest { color:var(--text-bright); font-weight:600; }
.hist-action { font-size:10px; margin-left:auto; }
.ha-reduce { color:var(--red); }
.ha-rebuy { color:var(--yellow); }
.ma-status { display:flex; gap:12px; flex-wrap:wrap; padding:6px 0 2px; font-size:11px; }
.ma-pos { font-weight:600; }
.ma-pos.up { color:var(--red); }
.ma-pos.down { color:var(--green); }
.ma-dev { color:var(--text-dim); }
.ma-days { color:var(--text-dim); }
.drawdown-info { margin-top:6px; font-size:11px; color:var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <h1>价值投资控制台</h1>
  <div class="subtitle">RSI21+MA250 / PE+回撤 · 三标的策略</div>
  <div class="live-clock" id="liveClock">--:--:--</div>
  <div class="header-row">
  </div>
  <div class="update-time" id="updateTime">加载中...</div>
</div>

<div class="val-bar" id="valBar">
  <div class="val-card"><div class="vc-name">加载中...</div></div>
</div>

<div class="weight-label">投资权重（长期目标配置）</div>
<div class="weight-bar">
  <span class="weight-tag">红利低波 <span class="w">40%</span></span>
  <span class="weight-tag">价值100 <span class="w">40%</span></span>
  <span class="weight-tag">纳指100 <span class="w">20%</span></span>
</div>

<!-- 标的0: 红利低波 -->
<div class="etf-section" id="sec0">
  <div class="etf-title">
    <span class="name" id="n0">--</span>
    <span class="wb">40%</span>
    <span class="fund-code" id="f0">--</span>
  </div>
  <div class="card" id="priceCard0">
    <div class="card-label" id="info0">指数行情 · --</div>
    <div class="price-row">
      <span class="price-main" id="p0">--</span>
      <span class="price-change price-flat" id="c0">--</span>
    </div>
    <div class="metrics-grid">
      <div class="metric-box"><div class="metric-label">MA250</div><div class="metric-value" id="ma0">--</div></div>
      <div class="metric-box"><div class="metric-label">RSI21</div><div class="metric-value" id="rsi0">--</div></div>
    </div>
    <div class="ma-status" id="maStat0"></div>
    <div class="signal-bar" id="sigBar0">
      <div class="signal-dot green" id="dot0"></div>
      <span class="signal-label" id="sl0">--</span>
      <span class="signal-detail" id="sd0">--</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">操作建议</div>
    <div id="adv0"><div class="loading">加载中...</div></div>
  </div>
</div>

<div class="divider"></div>

<!-- 标的1: 价值100 -->
<div class="etf-section" id="sec1">
  <div class="etf-title">
    <span class="name" id="n1">--</span>
    <span class="wb">40%</span>
    <span class="fund-code" id="f1">--</span>
  </div>
  <div class="card" id="priceCard1">
    <div class="card-label" id="info1">指数行情 · --</div>
    <div class="price-row">
      <span class="price-main" id="p1">--</span>
      <span class="price-change price-flat" id="c1">--</span>
    </div>
    <div class="metrics-grid">
      <div class="metric-box"><div class="metric-label">MA250</div><div class="metric-value" id="ma1">--</div></div>
      <div class="metric-box"><div class="metric-label">RSI21</div><div class="metric-value" id="rsi1">--</div></div>
    </div>
    <div class="ma-status" id="maStat1"></div>
    <div class="signal-bar" id="sigBar1">
      <div class="signal-dot green" id="dot1"></div>
      <span class="signal-label" id="sl1">--</span>
      <span class="signal-detail" id="sd1">--</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">操作建议</div>
    <div id="adv1"><div class="loading">加载中...</div></div>
  </div>
</div>

<div class="divider"></div>

<!-- 标的2: 纳指100 -->
<div class="etf-section" id="sec2">
  <div class="etf-title pe">
    <span class="name" id="n2">--</span>
    <span class="wb">20%</span>
    <span class="fund-code" id="f2">--</span>
  </div>
  <div class="card" id="priceCard2">
    <div class="card-label" id="info2">指数行情 · --</div>
    <div class="price-row">
      <span class="price-main" id="p2">--</span>
      <span class="price-change price-flat" id="c2">--</span>
    </div>
    <div class="metrics-grid">
      <div class="metric-box"><div class="metric-label">PE(TTM)</div><div class="metric-value" id="pe2">--</div></div>
      <div class="metric-box"><div class="metric-label">PE分位</div><div class="metric-value" id="pp2">--</div></div>
    </div>
    <div class="drawdown-info" id="dd2"></div>
    <div class="signal-bar" id="sigBar2">
      <div class="signal-dot green" id="dot2"></div>
      <span class="signal-label" id="sl2">--</span>
      <span class="signal-detail" id="sd2">--</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">操作建议</div>
    <div id="adv2"><div class="loading">加载中...</div></div>
  </div>
</div>

<script>
/* 全局数据缓存 */
var CACHE = null;

/* 时钟 */
function updateClock() {
  var d = new Date();
  var h = ('0' + d.getHours()).slice(-2);
  var m = ('0' + d.getMinutes()).slice(-2);
  var s = ('0' + d.getSeconds()).slice(-2);
  var w = ['日','一','二','三','四','五','六'];
  var ds = d.getFullYear() + '-' + ('0' + (d.getMonth()+1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2) + ' 周' + w[d.getDay()];
  var html = h + '<span class="sep">:</span>' + m + '<span class="sep">:</span>' + s + '<span style="font-size:12px;color:#8b949e;margin-left:8px;">' + ds + '</span>';
  document.getElementById('liveClock').innerHTML = html;
}
updateClock();
setInterval(updateClock, 1000);

/* 渲染卡片 */
function updateCard(etf, idx) {
  var id = idx;
  var isPE = (etf.type === 'pe_drawdown');
  var isIndexPrice = etf.is_index_price;

  /* 标题 */
  document.getElementById('n' + id).textContent = etf.index_name || '--';
  document.getElementById('f' + id).textContent = etf.index_code || '';

  if (etf.error) {
    document.getElementById('p' + id).textContent = '数据异常';
    document.getElementById('adv' + id).innerHTML = '<div class="error-msg">' + (etf.error || '获取失败') + '</div>';
    return;
  }

  /* 行情信息 */
  document.getElementById('info' + id).textContent = '指数行情 · ' + (etf.index_code || '') + ' ' + (etf.index_name || '');

  /* 价格 - 指数行情2位小数，ETF行情4位 */
  var dec = isIndexPrice ? 2 : 4;
  var priceEl = document.getElementById('p' + id);
  priceEl.textContent = (etf.current_price != null) ? etf.current_price.toFixed(dec) : '--';
  var cel = document.getElementById('c' + id);
  var pct = etf.price_change_pct;
  cel.textContent = (pct != null) ? ((pct >= 0 ? '+' : '') + pct.toFixed(2) + '%') : '--';
  cel.className = 'price-change ' + ((pct == null) ? 'price-flat' : (pct > 0 ? 'price-up' : (pct < 0 ? 'price-down' : 'price-flat')));

  /* PE / RSI */
  if (isPE) {
    document.getElementById('pe2').textContent = (etf.pe_ttm != null) ? etf.pe_ttm.toFixed(1) : '--';
    var pctEl = document.getElementById('pp2');
    pctEl.textContent = (etf.pe_percentile != null) ? etf.pe_percentile.toFixed(1) + '%' : '--';
    var p = etf.pe_percentile;
    pctEl.style.color = (p == null) ? '#8b949e' : (p >= 85 ? '#f85149' : (p >= 70 ? '#d29922' : (p >= 50 ? '#f0f6fc' : '#3fb950')));
    /* 回撤信息 */
    var ddEl = document.getElementById('dd2');
    if (ddEl) {
      var dd = etf.drawdown != null ? etf.drawdown : '--';
      var hp = etf.high_price != null ? etf.high_price.toFixed(0) : '--';
      ddEl.innerHTML = '高点 ' + hp + ' · 回撤 <span style="color:' + (dd < -8 ? '#f85149' : '#8b949e') + ';">' + dd + '%</span> · ' + (etf.drawdown_zone || '');
    }
  } else {
    document.getElementById('ma' + id).textContent = (etf.ma250 != null) ? etf.ma250.toFixed(2) : '--';
    document.getElementById('rsi' + id).textContent = (etf.rsi21 != null) ? etf.rsi21.toFixed(1) : '--';
  }

  /* MA250状态（仅RSI+MA250标的） */
  var maStatEl = document.getElementById('maStat' + id);
  if (maStatEl && !isPE) {
    var mPct = etf.price_vs_ma250_pct;
    var posText, posCls, devText, daysText;
    if (mPct == null) {
      posText = '--'; posCls = ''; devText = '--'; daysText = '';
    } else if (mPct >= 0) {
      posText = '高于MA250'; posCls = 'up';
      devText = '+' + mPct.toFixed(2) + '%';
      daysText = '站稳' + (etf.days_above_ma250 || 0) + '天';
    } else {
      posText = '低于MA250'; posCls = 'down';
      devText = mPct.toFixed(2) + '%';
      daysText = '跌破' + (etf.days_below_ma250 || 0) + '天';
    }
    maStatEl.innerHTML = '<span class="ma-pos ' + posCls + '">' + posText + '</span>'
                       + '<span class="ma-dev">偏离 ' + devText + '</span>'
                       + '<span class="ma-days">' + daysText + '</span>';
  } else if (maStatEl) {
    maStatEl.innerHTML = '';
  }

  /* 信号灯 */
  var dot = document.getElementById('dot' + id);
  dot.className = 'signal-dot ' + etf.risk_signal;
  document.getElementById('sl' + id).textContent = etf.risk_label || '--';

  /* 操作建议 - 内联格式：RSI 45.5 · 偏冷低估·弱势区 → 1.2份 */
  var html = '';

  /* 当前定投建议 */
  var investAmount = (etf.invest_amount != null) ? etf.invest_amount : '--';
  var investDetail = (etf.invest_detail != null) ? etf.invest_detail : '';
  if (!isPE) {
    var rsi = (etf.rsi21 != null) ? etf.rsi21.toFixed(1) : '--';
    html += '<div class="advice-item"><span class="advice-icon">💰</span>';
    html += '<div class="advice-line">定投：<strong>' + investAmount + '</strong> <span class="advice-rule">RSI ' + rsi + ' · ' + investDetail + ' → ' + investAmount + '</span></div></div>';
  } else {
    var pePct = (etf.pe_percentile != null) ? etf.pe_percentile.toFixed(1) + '%' : '--';
    var ddVal = (etf.drawdown != null) ? etf.drawdown + '%' : '--';
    html += '<div class="advice-item"><span class="advice-icon">💰</span>';
    html += '<div class="advice-line">定投：<strong>' + investAmount + '</strong> <span class="advice-rule">PE分位 ' + pePct + ' · 回撤' + ddVal + ' → ' + investAmount + '</span></div></div>';
  }

  /* 减仓建议 */
  if (etf.reduce_advice && etf.reduce_advice.action) {
    html += '<div class="advice-item"><span class="advice-icon">📉</span>';
    html += '<div class="advice-line"><span style="color:#f85149;font-weight:600;">' + etf.reduce_advice.action + ' ' + (etf.reduce_advice.pct || '') + '</span> <span class="advice-rule">' + (etf.reduce_advice.detail || '') + '</span></div></div>';
  }

  /* 回补建议 */
  if (etf.rebuy_advice && etf.rebuy_advice.action) {
    html += '<div class="advice-item"><span class="advice-icon">📈</span>';
    html += '<div class="advice-line"><span style="color:#d29922;font-weight:600;">' + etf.rebuy_advice.action + '</span> <span class="advice-rule">' + (etf.rebuy_advice.detail || '') + '</span></div></div>';
  }

  /* 历史操作建议 */
  if (etf.history_advice && etf.history_advice.length > 0) {
    html += '<div class="hist-title">近12个月操作建议（每月21日）</div>';
    for (var h = etf.history_advice.length - 1; h >= 0; h--) {
      var ha = etf.history_advice[h];
      var detail = ha.invest_detail || '';
      var ruleText = '';
      if (!isPE) {
        ruleText = 'RSI ' + (ha.rsi21 != null ? ha.rsi21 : '--') + ' · ' + detail + ' → ' + ha.invest;
      } else {
        ruleText = 'PE分位' + (ha.pe_percentile != null ? ha.pe_percentile + '%' : '--') + ' · ' + detail + ' → ' + ha.invest;
      }
      html += '<div class="hist-row">';
      html += '<span class="hist-date">' + ha.date + '</span>';
      html += '<span class="hist-rule">' + ruleText + '</span>';
      var actHtml = '';
      if (ha.reduce) actHtml += '<span class="ha-reduce">📉' + ha.reduce + '</span>';
      if (ha.rebuy) actHtml += '<span class="ha-rebuy">📈' + ha.rebuy + '</span>';
      if (actHtml) html += '<span class="hist-action">' + actHtml + '</span>';
      html += '</div>';
    }
  }

  document.getElementById('adv' + id).innerHTML = html;
}

/* 加载数据 */
function loadData() {
  var url = 'data.json?t=' + new Date().getTime();
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      CACHE = data;
      document.getElementById('updateTime').textContent = '更新: ' + (data.update_time || '--');

      /* 渲染估值横条 */
      var bar = document.getElementById('valBar');
      if (data.etfs && data.etfs.length >= 3) {
        var html = '';
        for (var i = 0; i < data.etfs.length; i++) {
          var etf = data.etfs[i];
          var isPE = (etf.type === 'pe_drawdown');
          var zoneDetail = isPE ? (etf.zone || '--') : (etf.invest_detail || etf.zone || '--');
          var colorCls = 'vc-green';
          if (etf.risk_signal === 'yellow') colorCls = 'vc-yellow';
          else if (etf.risk_signal === 'red') colorCls = 'vc-red';
          if (isPE && colorCls === 'vc-green') colorCls = 'vc-purple';
          var gaugeVal = isPE ? (etf.pe_percentile != null ? etf.pe_percentile : 0) : (etf.rsi21 != null ? etf.rsi21 : 50);
          var gaugePct = Math.min(100, Math.max(0, gaugeVal));
          var gaugeColor;
          if (gaugePct <= 30) gaugeColor = '#3fb950';
          else if (gaugePct <= 70) gaugeColor = '#d29922';
          else gaugeColor = '#f85149';
          html += '<div class="val-card">';
          html += '<div class="vc-name">' + (etf.index_name || '--') + '</div>';
          html += '<div class="vc-zone ' + colorCls + '">' + zoneDetail + '</div>';
          if (isPE) {
            var pePct = (etf.pe_percentile != null) ? etf.pe_percentile.toFixed(1) + '%' : '--';
            html += '<div class="vc-sub">PE分位 ' + pePct + '</div>';
          } else {
            var rsi = (etf.rsi21 != null) ? etf.rsi21.toFixed(1) : '--';
            html += '<div class="vc-sub">RSI ' + rsi + '</div>';
          }
          html += '<div class="val-gauge"><div class="val-gauge-fill" style="width:' + gaugePct + '%;background:' + gaugeColor + ';"></div></div>';
          html += '</div>';
        }
        bar.innerHTML = html;
      }

      if (data.etfs && data.etfs.length >= 3) {
        updateCard(data.etfs[0], 0);
        updateCard(data.etfs[1], 1);
        updateCard(data.etfs[2], 2);
      }
    })
    .catch(function(err) {
      console.error('Load error:', err);
      if (!CACHE) {
        document.getElementById('updateTime').textContent = '加载失败';
        var msg = '<div class="error-msg">数据加载失败: ' + (err.message || '未知错误') + '</div>';
        document.getElementById('adv0').innerHTML = msg;
        document.getElementById('adv1').innerHTML = msg;
        document.getElementById('adv2').innerHTML = msg;
      }
    });
}

loadData();
setInterval(loadData, 30 * 60 * 1000);
</script>
