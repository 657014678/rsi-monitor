<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价值投资控制台 · RSI21+MA250 / PE+回撤</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --text-bright: #f0f6fc;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 12px;
  max-width: 480px;
  margin: 0 auto;
}
.header { text-align:center; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.header h1 { font-size:18px; color:var(--text-bright); margin-bottom:4px; }
.subtitle { font-size:12px; color:var(--text-dim); }
.live-clock { font-size:20px; font-weight:700; color:var(--text-bright); font-variant-numeric:tabular-nums; letter-spacing:1px; margin-top:6px; }
.live-clock .sep { animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.header-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:6px; }
.guide-btn { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:4px 10px; border-radius:6px; background:rgba(63,185,80,0.12); color:var(--green); text-decoration:none; border:1px solid rgba(63,185,80,0.25); }
.weight-bar { display:flex; gap:6px; margin-bottom:16px; justify-content:center; }
.weight-tag { font-size:11px; padding:3px 10px; border-radius:12px; background:var(--card); border:1px solid var(--border); color:var(--text-dim); }
.weight-tag .w { color:var(--text-bright); font-weight:600; }
.etf-section { margin-bottom:20px; }
.etf-title { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding:8px 12px; background:var(--card); border-radius:8px; border-left:3px solid var(--accent); }
.etf-title.pe { border-left-color:var(--purple); }
.etf-title .name { font-size:16px; font-weight:600; color:var(--text-bright); }
.etf-title .fund-code { font-size:12px; color:var(--text-dim); margin-left:auto; }
.etf-title .wb { font-size:10px; padding:1px 6px; border-radius:8px; background:rgba(88,166,255,0.15); color:var(--accent); font-weight:600; }
.etf-title.pe .wb { background:rgba(188,140,255,0.15); color:var(--purple); }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; }
.card-label { font-size:11px; color:var(--text-dim); margin-bottom:6px; }
.price-row { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
.price-main { font-size:28px; font-weight:700; color:var(--text-bright); }
.price-change { font-size:14px; font-weight:600; }
.price-up { color:var(--red); }
.price-down { color:var(--green); }
.price-flat { color:var(--text-dim); }
.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.metric-box { background:rgba(255,255,255,0.03); border-radius:6px; padding:8px 10px; }
.metric-label { font-size:10px; color:var(--text-dim); }
.metric-value { font-size:16px; font-weight:600; color:var(--text-bright); }
.signal-bar { display:flex; align-items:center; gap:10px; }
.signal-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.signal-dot.green { background:var(--green); box-shadow:0 0 8px var(--green); }
.signal-dot.yellow { background:var(--yellow); box-shadow:0 0 8px var(--yellow); }
.signal-dot.red { background:var(--red); box-shadow:0 0 8px var(--red); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.signal-label { font-size:14px; font-weight:600; color:var(--text-bright); }
.signal-detail { font-size:12px; color:var(--text-dim); margin-left:auto; }
.advice-item { display:flex; align-items:flex-start; gap:8px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.advice-icon { font-size:16px; flex-shrink:0; }
.advice-text { font-size:13px; color:var(--text); }
.advice-text strong { color:var(--text-bright); font-size:15px; }
.advice-detail { font-size:11px; color:var(--text-dim); }
.rsi-bar { height:4px; border-radius:2px; background:linear-gradient(to right,var(--green) 0%,var(--green) 35%,var(--yellow) 55%,var(--red) 72%,var(--red) 100%); position:relative; margin-top:6px; }
.pe-bar { height:8px; border-radius:4px; background:rgba(255,255,255,0.08); position:relative; margin-top:6px; overflow:hidden; }
.pe-bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
.pe-bar-zones { display:flex; font-size:9px; color:var(--text-dim); justify-content:space-between; margin-top:2px; }
.drawdown-box { background:rgba(255,255,255,0.03); border-radius:6px; padding:8px 10px; }
.divider { height:1px; background:var(--border); margin:20px 0; }
.loading { text-align:center; padding:40px 0; color:var(--text-dim); }
.error-msg { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); border-radius:6px; padding:12px; text-align:center; color:var(--red); font-size:13px; }
.xueqiu-btn { display:inline-flex; align-items:center; gap:3px; font-size:10px; padding:2px 8px; border-radius:4px; background:rgba(88,166,255,0.15); color:var(--accent); text-decoration:none; border:1px solid rgba(88,166,255,0.25); }
.position-section { margin-top:8px; }
.position-toggle { font-size:11px; color:var(--accent); cursor:pointer; padding:4px 0; border:none; background:none; text-decoration:underline; }
.position-panel { display:none; margin-top:6px; padding:10px; background:rgba(255,255,255,0.03); border-radius:6px; border:1px solid var(--border); }
.position-panel.show { display:block; }
.position-panel label { font-size:11px; color:var(--text-dim); display:block; margin-bottom:4px; }
.position-panel input { width:100%; padding:4px 8px; font-size:12px; border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text); margin-bottom:6px; }
.position-panel button { font-size:11px; padding:4px 12px; border-radius:4px; border:1px solid var(--accent); background:rgba(88,166,255,0.15); color:var(--accent); cursor:pointer; }
.cooldown-active { background:rgba(210,153,34,0.15); color:var(--yellow); font-size:11px; margin-top:6px; padding:4px 8px; border-radius:4px; }
.cooldown-clear { background:rgba(63,185,80,0.15); color:var(--green); font-size:11px; margin-top:6px; padding:4px 8px; border-radius:4px; }
.position-record { font-size:11px; color:var(--text-dim); margin-top:4px; }
.del-btn { color:var(--red); cursor:pointer; margin-left:6px; font-size:10px; }
.update-time { font-size:11px; color:var(--text-dim); margin-top:6px; }
</style>
</head>
<body>

<div class="header">
  <h1>价值投资控制台</h1>
  <div class="subtitle">RSI21+MA250 / PE+回撤 · 三标的策略</div>
  <div class="live-clock" id="liveClock">--:--:--</div>
  <div class="header-row">
    <a class="guide-btn" href="guide.html">策略科普 · 心理按摩</a>
  </div>
  <div class="update-time" id="updateTime">加载中...</div>
</div>

<div class="weight-bar">
  <span class="weight-tag">红利低波 <span class="w">40%</span></span>
  <span class="weight-tag">价值100 <span class="w">40%</span></span>
  <span class="weight-tag">纳指100 <span class="w">20%</span></span>
</div>

<!-- ETF 0: 红利低波 -->
<div class="etf-section">
  <div class="etf-title">
    <span class="name" id="n0">--</span>
    <span class="wb">40%</span>
    <span class="fund-code" id="f0">--</span>
  </div>
  <div class="card">
    <div class="card-label" id="info0">实时行情 · --</div>
    <div class="price-row">
      <span class="price-main" id="p0">--</span>
      <span class="price-change price-flat" id="c0">--</span>
    </div>
    <div class="metrics-grid">
      <div class="metric-box"><div class="metric-label">MA250</div><div class="metric-value" id="ma0">--</div></div>
      <div class="metric-box"><div class="metric-label">RSI21</div><div class="metric-value" id="rsi0">--</div></div>
    </div>
  </div>
  <div class="card">
    <div class="signal-bar">
      <div class="signal-dot green" id="dot0"></div>
      <span class="signal-label" id="sl0">--</span>
      <span class="signal-detail" id="sd0">--</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">操作建议</div>
    <div id="adv0"><div class="loading">加载中...</div></div>
    <div class="position-section">
      <button class="position-toggle" onclick="togglePos(0)">持仓记录</button>
      <div class="position-panel" id="pp0">
        <label>减仓日期</label>
        <input type="date" id="rd0">
        <label>减仓比例(%)</label>
        <input type="number" id="rp0" placeholder="15或30" min="1" max="100">
        <button onclick="savePos(0)">保存</button>
        <div id="pi0"></div>
      </div>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- ETF 1: 价值100 -->
<div class="etf-section">
  <div class="etf-title">
    <span class="name" id="n1">--</span>
    <span class="wb">40%</span>
    <span class="fund-code" id="f1">--</span>
  </div>
  <div class="card">
    <div class="card-label" id="info1">实时行情 · --</div>
    <div class="price-row">
      <span class="price-main" id="p1">--</span>
      <span class="price-change price-flat" id="c1">--</span>
    </div>
    <div class="metrics-grid">
      <div class="metric-box"><div class="metric-label">MA250</div><div class="metric-value" id="ma1">--</div></div>
      <div class="metric-box"><div class="metric-label">RSI21</div><div class="metric-value" id="rsi1">--</div></div>
    </div>
  </div>
  <div class="card">
    <div class="signal-bar">
      <div class="signal-dot green" id="dot1"></div>
      <span class="signal-label" id="sl1">--</span>
      <span class="signal-detail" id="sd1">--</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">操作建议</div>
    <div id="adv1"><div class="loading">加载中...</div></div>
    <div class="position-section">
      <button class="position-toggle" onclick="togglePos(1)">持仓记录</button>
      <div class="position-panel" id="pp1">
        <label>减仓日期</label>
        <input type="date" id="rd1">
        <label>减仓比例(%)</label>
        <input type="number" id="rp1" placeholder="15或30" min="1" max="100">
        <button onclick="savePos(1)">保存</button>
        <div id="pi1"></div>
      </div>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- ETF 2: 纳指100 -->
<div class="etf-section">
  <div class="etf-title pe">
    <span class="name" id="n2">--</span>
    <span class="wb">20%</span>
    <span class="fund-code" id="f2">--</span>
  </div>
  <div class="card">
    <div class="card-label" id="info2">纳指100指数 · --</div>
    <div class="price-row">
      <span class="price-main" id="p2">--</span>
      <span class="price-change price-flat" id="c2">--</span>
    </div>
    <div class="metrics-grid">
      <div class="metric-box"><div class="metric-label">PE(TTM)</div><div class="metric-value" id="pe2">--</div></div>
      <div class="metric-box"><div class="metric-label">PE分位</div><div class="metric-value" id="pp2">--</div></div>
    </div>
  </div>
  <div class="card">
    <div class="signal-bar">
      <div class="signal-dot green" id="dot2"></div>
      <span class="signal-label" id="sl2">--</span>
      <span class="signal-detail" id="sd2">--</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">操作建议</div>
    <div id="adv2"><div class="loading">加载中...</div></div>
    <div class="position-section">
      <button class="position-toggle" onclick="togglePos(2)">持仓记录</button>
      <div class="position-panel" id="pp2">
        <label>减仓日期</label>
        <input type="date" id="rd2">
        <label>减仓比例(%)</label>
        <input type="number" id="rp2" placeholder="15或30" min="1" max="100">
        <button onclick="savePos(2)">保存</button>
        <div id="pi2"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* 全局数据缓存 */
var CACHE = null;

/* 时钟 */
function updateClock() {
  var d = new Date();
  var h = ('0' + d.getHours()).slice(-2);
  var m = ('0' + d.getMinutes()).slice(-2);
  var s = ('0' + d.getSeconds()).slice(-2);
  var w = ['日','一','二','三','四','五','六'];
  var ds = d.getFullYear() + '-' + ('0' + (d.getMonth()+1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2) + ' 周' + w[d.getDay()];
  var html = h + '<span class="sep">:</span>' + m + '<span class="sep">:</span>' + s + '<span style="font-size:12px;color:#8b949e;margin-left:8px;">' + ds + '</span>';
  document.getElementById('liveClock').innerHTML = html;
}
updateClock();
setInterval(updateClock, 1000);

/* 持仓记录 */
function pk(i) { return 'pos_' + i; }
function loadPos(i) {
  var r = localStorage.getItem(pk(i));
  return r ? JSON.parse(r) : [];
}
function savePos(i) {
  var d = document.getElementById('rd' + i).value;
  var p = parseInt(document.getElementById('rp' + i).value);
  if (!d || !p) { alert('请填写减仓日期和比例'); return; }
  var arr = loadPos(i);
  arr.push({ date: d, pct: p });
  localStorage.setItem(pk(i), JSON.stringify(arr));
  document.getElementById('rd' + i).value = '';
  document.getElementById('rp' + i).value = '';
  renderPos(i);
}
function deletePos(i, j) {
  var arr = loadPos(i);
  arr.splice(j, 1);
  localStorage.setItem(pk(i), JSON.stringify(arr));
  renderPos(i);
}
function togglePos(i) {
  document.getElementById('pp' + i).classList.toggle('show');
  if (document.getElementById('pp' + i).classList.contains('show')) renderPos(i);
}
function renderPos(i) {
  var arr = loadPos(i);
  var el = document.getElementById('pi' + i);
  if (!arr.length) { el.innerHTML = '<div style="font-size:11px;color:#8b949e;">暂无记录</div>'; return; }
  var cd = (i === 2) ? 60 : 30;
  var html = '';
  for (var j = 0; j < arr.length; j++) {
    var pos = arr[j];
    var end = new Date(pos.date);
    end = new Date(end.getTime() + cd * 86400000);
    var now = new Date();
    var active = (now < end);
    var days = active ? Math.ceil((end - now) / 86400000) : 0;
    html += '<div style="font-size:11px;color:#8b949e;margin-top:4px;">';
    html += '减仓' + pos.pct + '% (' + pos.date + ') ';
    if (active) {
      html += '<span style="background:rgba(210,153,34,0.15);color:#d29922;padding:2px 6px;border-radius:3px;font-size:10px;">冷却中·剩' + days + '天</span>';
    } else {
      html += '<span style="background:rgba(63,185,80,0.15);color:#3fb950;padding:2px 6px;border-radius:3px;font-size:10px;">冷却已结束</span>';
    }
    html += ' <span style="color:#f85149;cursor:pointer;font-size:10px;" onclick="deletePos(' + i + ',' + j + ')">删除</span>';
    html += '</div>';
  }
  el.innerHTML = html;
}

/* 渲染卡片 */
function updateCard(etf, idx) {
  var id = idx;
  var isPE = (etf.type === 'pe_drawdown');

  /* 标题 */
  document.getElementById('n' + id).textContent = etf.index_name || '--';
  document.getElementById('f' + id).textContent = (etf.fund_code || '') + ' ' + (etf.fund_name || '');

  if (etf.error) {
    document.getElementById('p' + id).textContent = '数据异常';
    document.getElementById('adv' + id).innerHTML = '<div class="error-msg">' + (etf.error || '获取失败') + '</div>';
    return;
  }

  /* 行情信息 */
  if (isPE) {
    document.getElementById('info' + id).textContent = '纳指100指数 · ' + (etf.fund_code || '') + ' ' + (etf.fund_name || '');
  } else {
    document.getElementById('info' + id).textContent = '实时行情 · ' + (etf.etf_code || '') + ' ' + (etf.etf_name || '');
  }

  /* 价格 */
  var dec = isPE ? 2 : 4;
  document.getElementById('p' + id).textContent = etf.current_price.toFixed(dec);
  var cel = document.getElementById('c' + id);
  var pct = etf.price_change_pct;
  cel.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
  cel.className = 'price-change ' + (pct > 0 ? 'price-up' : (pct < 0 ? 'price-down' : 'price-flat'));

  /* PE / RSI */
  if (isPE) {
    document.getElementById('pe2').textContent = etf.pe_ttm.toFixed(1);
    var pctEl = document.getElementById('pp2');
    pctEl.textContent = etf.pe_percentile.toFixed(1) + '%';
    var p = etf.pe_percentile;
    pctEl.style.color = p >= 85 ? '#f85149' : (p >= 70 ? '#d29922' : (p >= 50 ? '#f0f6fc' : '#3fb950'));
  } else {
    document.getElementById('ma' + id).textContent = etf.ma250.toFixed(4);
    document.getElementById('rsi' + id).textContent = etf.rsi21.toFixed(1);
  }

  /* 信号灯 */
  var dot = document.getElementById('dot' + id);
  dot.className = 'signal-dot ' + etf.risk_signal;
  document.getElementById('sl' + id).textContent = etf.risk_label || '--';

  /* 操作建议 */
  var html = '';
  html += '<div class="advice-item"><span class="advice-icon">💰</span><div><div class="advice-text">定投：<strong>' + etf.invest_amount + '</strong></div><div class="advice-detail">' + etf.invest_detail + '</div></div></div>';

  if (etf.reduce_advice) {
    html += '<div class="advice-item"><span class="advice-icon">📉</span><div><div class="advice-text"><span style="color:#f85149;font-weight:600;">' + etf.reduce_advice.action + ' ' + etf.reduce_advice.pct + '</span></div><div class="advice-detail">' + etf.reduce_advice.detail + '</div></div></div>';
  }
  if (etf.rebuy_advice) {
    html += '<div class="advice-item"><span class="advice-icon">📈</span><div><div class="advice-text"><span style="color:#d29922;font-weight:600;">' + etf.rebuy_advice.action + '</span></div><div class="advice-detail">' + etf.rebuy_advice.detail + '</div></div></div>';
  }

  document.getElementById('adv' + id).innerHTML = html;
}

/* 加载数据 */
function loadData() {
  var url = 'data.json?t=' + new Date().getTime();
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      CACHE = data;
      document.getElementById('updateTime').textContent = '更新: ' + (data.update_time || '--');
      if (data.etfs && data.etfs.length >= 3) {
        updateCard(data.etfs[0], 0);
        updateCard(data.etfs[1], 1);
        updateCard(data.etfs[2], 2);
      }
    })
    .catch(function(err) {
      console.error('Load error:', err);
      if (!CACHE) {
        document.getElementById('updateTime').textContent = '加载失败';
        var msg = '<div class="error-msg">数据加载失败: ' + (err.message || '未知错误') + '</div>';
        document.getElementById('adv0').innerHTML = msg;
        document.getElementById('adv1').innerHTML = msg;
        document.getElementById('adv2').innerHTML = msg;
      }
    });
}

loadData();
setInterval(loadData, 30 * 60 * 1000);
</script>

</body>
</html>
